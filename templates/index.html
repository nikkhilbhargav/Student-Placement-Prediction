<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Prediction</title>
</head>
<body>

<h1>Student Placement Prediction</h1>

<form action="/predict" method="post">

<input type="number" step="0.01" name="cgpa" placeholder="CGPA (0/10)" required>

<input type="number" name="internships" placeholder="Internships (0/10)" required>

<input type="number" name="projects" placeholder="Projects (0/10)" required>

<input type="number" name="workshops" placeholder="Workshops (0/10)" required>

<input type="number" step="0.01" name="aptitude" placeholder="Aptitude (00/100)" required>

<input type="number" step="0.01" name="softskills" placeholder="Soft Skills (0/10)" required>

<input type="number" name="extra" placeholder="Extra Activities (0/1)" required>

<input type="number" name="training" placeholder="Placement Training (0/1)" required>

<input type="number" step="0.01" name="ssc" placeholder="SSC Marks (00/100)" required>

<input type="number" step="0.01" name="hsc" placeholder="HSC Marks (00/100)" required>
<br><br>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}

<h2>{{ prediction }}</h2>

{% endif %}

</body>
</html>
